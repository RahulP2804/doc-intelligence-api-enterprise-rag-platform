version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docintellect-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-docintellect}
      POSTGRES_USER: ${DB_USER:-docintellect}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-docintellect}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: docintellect-redis
    command: >
      sh -c "redis-server
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docintellect-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-docintellect}
      DB_USER: ${DB_USER:-docintellect}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-credentials.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST_PATH}:/secrets/gcp-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
